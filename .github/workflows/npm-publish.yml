name: Publish NPM Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Validate tag format
        run: |
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid tag format. Expected v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "Tag format validated"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@veedubin'

      - name: Install dependencies
        run: npm install

      - name: Run typecheck
        run: npm run typecheck || npm run build -- --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not found after build"
            exit 1
          fi
          echo "Build output verified"

      # Attempt auth check to fail fast with clear error message
      - name: Verify NPM auth
        run: |
          TOKEN=$(node -e "console.log(process.env.NODE_AUTH_TOKEN ? 'set' : 'missing')")
          if [ "$TOKEN" = "missing" ]; then
            echo "ERROR: NODE_AUTH_TOKEN is not set."
            echo "Please set either NPM_PUBLISH_TOKEN or NPM_TOKEN in GitHub Actions secrets."
            exit 1
          fi
          npm whoami 2>/dev/null || echo "WARNING: npm whoami failed — token may be invalid"

      - name: Publish to NPM with provenance
        run: npm publish --access public --provenance
        env:
          # Fallback: try NPM_PUBLISH_TOKEN first, then NPM_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN != '' && secrets.NPM_PUBLISH_TOKEN || secrets.NPM_TOKEN }}